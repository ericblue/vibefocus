<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="7" fill="#0b1120"/>
  <defs>
    <linearGradient id="v-left" x1="8" y1="10" x2="16" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0469f2"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="v-right" x1="24" y1="10" x2="16" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7f76ff"/>
      <stop offset="1" stop-color="#6c5af2"/>
    </linearGradient>
  </defs>
  <!-- V shape - left arm -->
  <polygon points="7,9 13,9 16.5,23.5 12.5,23.5" fill="url(#v-left)"/>
  <!-- V shape - right arm -->
  <polygon points="25,9 19,9 15.5,23.5 19.5,23.5" fill="url(#v-right)"/>
  <!-- Circle arc -->
  <circle cx="16" cy="15" r="9.5" stroke="#3389ea" stroke-width="0.8" fill="none" opacity="0.6"/>
  <!-- Horizontal line through middle -->
  <line x1="4" y1="15.5" x2="28" y2="15.5" stroke="#3389ea" stroke-width="0.5" opacity="0.4"/>
  <!-- Center dot -->
  <circle cx="16" cy="15.5" r="1" fill="#fefefe"/>
</svg>
