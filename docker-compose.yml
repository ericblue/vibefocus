services:
  vibefocus:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${VIBEFOCUS_PORT:-8000}:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=sqlite:///./data/vibefocus.db
    volumes:
      - ./data:/app/data
      ## Uncomment and set to your development directory to enable
      ## git sync, code analysis, and code-aware AI chat:
      # - /path/to/your/projects:/path/to/your/projects:ro
