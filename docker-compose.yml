services:
  vibefocus:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${VIBEFOCUS_PORT:-8000}:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=sqlite:///./data/vibefocus.db
    volumes:
      - ./data:/app/data
      # Mount local repos (read-only) for git sync, code analysis, and AI chat.
      # Set PROJECTS_DIR to your development directory:
      #   PROJECTS_DIR=/Users/you/Development docker compose up -d
      - ${PROJECTS_DIR:-.}:${PROJECTS_DIR:-.}:ro
